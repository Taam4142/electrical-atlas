name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  website:
    name: Website checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated topic files are tracked and current
        run: |
          git ls-files --error-unmatch -- electrical-atlas-site/src/lib/generated/atlasTopics.ts electrical-atlas-site/src/lib/generated/atlasTopicMeta.ts electrical-atlas-site/public/data/atlas-topics.json
          npm run check:generated

      - name: Run Astro checks
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build
